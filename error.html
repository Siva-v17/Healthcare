<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>404 | Heartfelt Healthcare — Page Not Found</title>
  <!-- GSAP Animation Library (lightweight & smooth) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    /* ----------------------------------------------
      RESET & GLOBAL STYLES (no errors, clean theme)
    ------------------------------------------------ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Root variables — fully defined to avoid missing var issues */
    :root {
      --deep-navy: #0f172a;      /* deep base color */
      --deeper-bg: #020617;      /* gradient companion */
      --pure-white: #ffffff;
      --soft-gray: #cbd5e1;
      --teal-glow: rgba(20, 184, 166, 0.6);
      --card-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
      --btn-gradient-start: #0d9488;
      --btn-gradient-end: #14b8a6;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--deep-navy), var(--deeper-bg));
      color: var(--pure-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 2rem 1.5rem;
    }

    /* Subtle animated radial orbs behind content (atmospheric) */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 18% 30%, rgba(255, 255, 255, 0.06), transparent 45%),
        radial-gradient(circle at 85% 70%, rgba(20, 184, 166, 0.08), transparent 50%),
        radial-gradient(circle at 40% 85%, rgba(255, 255, 255, 0.03), transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    /* main container for 404 content — high z-index */
    .error-page {
      text-align: center;
      max-width: 760px;
      width: 100%;
      position: relative;
      z-index: 10;
      backdrop-filter: blur(2px);
      background: rgba(15, 23, 42, 0.2);
      border-radius: 64px;
      padding: 2rem 2rem 3rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    /* 404 huge typography — strong presence */
    .error-code {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--pure-white);
      text-shadow: 0 0 35px rgba(255, 255, 255, 0.25), 0 8px 20px rgba(0, 0, 0, 0.2);
      line-height: 1;
      margin-bottom: 12px;
    }

    /* heart icon (healthcare symbol) with interactive glow */
    .heart {
      font-size: 82px;
      margin: 12px 0 8px;
      display: inline-block;
      filter: drop-shadow(0 0 12px rgba(255, 80, 120, 0.4));
      cursor: default;
      transition: transform 0.2s ease;
    }

    /* title & description */
    .error-title {
      font-size: clamp(28px, 7vw, 44px);
      font-weight: 700;
      margin: 18px 0 12px;
      background: linear-gradient(120deg, #ffffff, #b9f5ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .error-text {
      max-width: 550px;
      margin: 12px auto 0;
      color: var(--soft-gray);
      font-size: 1.1rem;
      line-height: 1.65;
      font-weight: 450;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 20px;
      border-radius: 48px;
      backdrop-filter: blur(4px);
    }

    /* CTA button - clean & modern */
    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 38px;
      padding: 14px 38px;
      border-radius: 60px;
      background: var(--pure-white);
      color: #0f172a;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
      transition: all 0.25s ease;
      box-shadow: var(--card-shadow);
      border: none;
      cursor: pointer;
      backdrop-filter: blur(2px);
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    /* gradient underline effect & hover motion */
    .home-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(20, 184, 166, 0.2), transparent);
      transition: left 0.5s ease;
      z-index: -1;
    }

    .home-btn:hover::before {
      left: 100%;
    }

    .home-btn:hover {
      transform: translateY(-5px) scale(1.02);
      background: #ffffff;
      color: #0f172a;
      box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.4);
    }

    .home-btn:active {
      transform: translateY(2px);
    }

    /* pulsing ring element (health + care radar) */
    .pulse-ring {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.18);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
      box-shadow: 0 0 12px rgba(20, 184, 166, 0.2);
    }

    /* additional floating cross/plus decoration (medical hint) */
    .medical-plus {
      position: absolute;
      font-size: 26px;
      opacity: 0.2;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }

    /* responsive touches: make page comfy on mobile */
    @media (max-width: 620px) {
      .error-page {
        padding: 1.5rem 1.2rem 2.2rem;
        border-radius: 48px;
      }
      .home-btn {
        padding: 11px 28px;
        font-size: 0.95rem;
      }
      .error-text {
        font-size: 0.95rem;
        padding: 10px 16px;
      }
      .heart {
        font-size: 64px;
      }
    }

    /* smooth scroll & hidden overflow for small devices */
    @media (max-width: 480px) {
      .pulse-ring {
        width: 200px;
        height: 200px;
      }
    }

    /* fix any accidental clipping & focus accessibility */
    a:focus-visible, .home-btn:focus-visible {
      outline: 3px solid #14b8a6;
      outline-offset: 4px;
      border-radius: 60px;
    }
  </style>
</head>
<body>

<!-- background ambiance: 2 medical plus symbols floating -->
<!-- <div class="medical-plus" style="top: 12%; left: 8%;">⚕️</div>
<div class="medical-plus" style="bottom: 12%; right: 5%;">🩺</div>
<div class="medical-plus" style="top: 70%; left: 85%; font-size: 32px;">❤️‍🩹</div> -->

<!-- animated pulse element (error page adds rhythm) -->
<div class="pulse-ring"></div>

<section class="error-page" aria-labelledby="error-title-id">
  <div class="error-code" aria-label="Error 404">404</div>
  <div class="heart" aria-label="healthcare heart icon">🫀</div>
  <h1 id="error-title-id" class="error-title">Heartfelt page not found</h1>
  <p class="error-text">
    Oops! The healthcare resource or appointment page you're looking for seems to have wandered off. 
    Don't worry — your well-being is our priority. Let's return you to a safe, secure place.
  </p>
  <a href="./index.html" class="home-btn" aria-label="Navigate back to home page">
  Back to Home
  </a>
</section>

<script>
  (function() {
    // ensure GSAP is fully loaded before any animations
    if (typeof gsap !== 'undefined') {
      
      // ---- KILL any existing potential conflicting animations ----
      // Clear all animations from elements that we are about to animate (avoid overlap)
      gsap.killTweensOf(".error-code");
      gsap.killTweensOf(".heart");
      gsap.killTweensOf(".error-title");
      gsap.killTweensOf(".error-text");
      gsap.killTweensOf(".home-btn");
      gsap.killTweensOf(".pulse-ring");
      
      // ---- RESET any inline styles to avoid glitches (optional but safe)
      gsap.set(".error-code", { clearProps: "all" });
      gsap.set(".heart", { clearProps: "all" });
      gsap.set(".error-title", { clearProps: "all" });
      gsap.set(".error-text", { clearProps: "all" });
      gsap.set(".home-btn", { clearProps: "all" });
      gsap.set(".pulse-ring", { clearProps: "all" });
      
      // ---- Entrance animation sequence (smooth & polished)
      // 1. 404 number bouncing in gracefully
      gsap.from(".error-code", {
        y: -100,
        opacity: 0,
        duration: 1.1,
        ease: "back.out(1.2)",
        clearProps: "y,opacity"
      });
      
      // 2. Heart animation: pop & gentle continuous beating (healthcare sign)
      gsap.from(".heart", {
        scale: 0,
        opacity: 0,
        duration: 0.85,
        delay: 0.45,
        ease: "elastic.out(1, 0.5)",
        clearProps: "scale,opacity",
        onComplete: () => {
          // infinite gentle heartbeat after initial pop
          gsap.to(".heart", {
            scale: 1.12,
            duration: 0.65,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            transformOrigin: "center center"
          });
        }
      });
      
      // 3. Title sliding from left with subtle fade
      gsap.from(".error-title", {
        x: -70,
        opacity: 0,
        duration: 0.9,
        delay: 0.75,
        ease: "power3.out",
        clearProps: "x,opacity"
      });
      
      // 4. Description text slides from right
      gsap.from(".error-text", {
        x: 70,
        opacity: 0,
        duration: 0.9,
        delay: 0.95,
        ease: "power2.out",
        clearProps: "x,opacity"
      });
      
      // 5. Button fade + upward motion
      gsap.from(".home-btn", {
        y: 50,
        opacity: 0,
        duration: 0.85,
        delay: 1.2,
        ease: "back.out(0.8)",
        clearProps: "y,opacity"
      });
      
      // 6. Pulse ring animation: expands and fades out repeatedly (sonar effect)
      gsap.to(".pulse-ring", {
        scale: 2.8,
        opacity: 0,
        duration: 2.2,
        repeat: -1,
        ease: "power1.out",
        delay: 0.3,
        transformOrigin: "center center"
      });
      
      // Additional glow animation on the heart for extra life (soft pulsation between beats)
      gsap.to(".heart", {
        textShadow: "0 0 16px rgba(255, 100, 130, 0.7)",
        duration: 0.9,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
      });
      
      // optional: parallax mouse move effect for medical plus signs (simple & polished)
      const plusElements = document.querySelectorAll('.medical-plus');
      if (plusElements.length && window.innerWidth > 768) {
        document.body.addEventListener('mousemove', (e) => {
          const mouseX = e.clientX / window.innerWidth;
          const mouseY = e.clientY / window.innerHeight;
          plusElements.forEach((el, idx) => {
            const speed = 12 + idx * 5;
            const moveX = (mouseX - 0.5) * speed;
            const moveY = (mouseY - 0.5) * speed;
            gsap.to(el, {
              x: moveX,
              y: moveY,
              duration: 1.2,
              ease: "power2.out",
              overwrite: true
            });
          });
        });
      }
      
      // also micro animation for error-code: subtle floating (gentle wellness vibe)
      gsap.to(".error-code", {
        y: -6,
        duration: 2.5,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut",
        delay: 1.5
      });
      
    } else {
      // Fallback if GSAP fails to load (very unlikely but safety)
      console.warn("GSAP not loaded, but fallback styles are active");
      const fallbackHeart = document.querySelector(".heart");
      if (fallbackHeart) {
        setInterval(() => {
          fallbackHeart.style.transform = "scale(1.1)";
          setTimeout(() => { fallbackHeart.style.transform = "scale(1)"; }, 400);
        }, 1200);
      }
    }
    
    // ---- Additional interactive micro fix: ensure home button link works elegantly ----
    const homeBtn = document.querySelector('.home-btn');
    if (homeBtn) {
      // If the actual ./index.html might not exist, we provide a smooth redirect fallback using current origin.
      // but still keep default behavior. To avoid error when no index.html, but in real scenario,
      // ./index.html is typical. We do nothing but ensure no console error on click.
      homeBtn.addEventListener('click', (e) => {
        // optional: add gentle click ripple effect (just for delight)
        const ripple = document.createElement('span');
        ripple.style.position = 'absolute';
        ripple.style.borderRadius = '50%';
        ripple.style.backgroundColor = 'rgba(20,184,166,0.3)';
        ripple.style.width = '40px';
        ripple.style.height = '40px';
        ripple.style.left = e.clientX - homeBtn.getBoundingClientRect().left - 20 + 'px';
        ripple.style.top = e.clientY - homeBtn.getBoundingClientRect().top - 20 + 'px';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'scale(0)';
        ripple.style.transition = 'transform 0.4s ease, opacity 0.4s';
        homeBtn.style.position = 'relative';
        homeBtn.style.overflow = 'hidden';
        homeBtn.appendChild(ripple);
        requestAnimationFrame(() => {
          ripple.style.transform = 'scale(8)';
          ripple.style.opacity = '0';
        });
        setTimeout(() => ripple.remove(), 500);
      });
    }
    
    // Additional on window load to ensure smooth rendering & extra layer of animation sync
    window.addEventListener('load', () => {
      // ensure any initial render flashes are gone; page looks crisp.
      document.body.style.overflowY = 'auto';
      // optional: set heart initial transform to none
      gsap.set(".heart", { clearProps: "transform" });
      // ensure no invisible elements
      const allAnimated = [".error-code", ".error-title", ".error-text", ".home-btn"];
      allAnimated.forEach(sel => {
        const el = document.querySelector(sel);
        if (el && getComputedStyle(el).opacity === '0') {
          gsap.set(sel, { opacity: 1 });
        }
      });
    });
    
    // Cleanup any possible error if some elements missing (defensive)
    if (!document.querySelector('.pulse-ring')) {
      console.warn("No pulse element, but visuals unaffected");
    }
  })();
</script>
</body>
</html>
